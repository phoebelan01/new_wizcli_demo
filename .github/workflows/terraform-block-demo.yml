name: Wiz CLI Terraform Block Test

on:
  workflow_dispatch: # Allows you to trigger the test manually in GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ---------------------------------------------------------
      # STEP 1: Plan the changes
      # ---------------------------------------------------------
      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # ---------------------------------------------------------
      # STEP 2: Wiz CLI Scan (The Blocker)
      # ---------------------------------------------------------
      - name: Run Wiz CLI IaC Scan
        env:
          # By setting these environment variables, Wiz CLI authenticates automatically
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          # 1. Download the latest Wiz CLI v1 binary
          curl -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          
          # 2. Run the scan with the custom policy using the v1 format
          # IMPORTANT: If Wiz finds a violation, it returns a non-zero exit code.
          # GitHub Actions sees this, FAILS this step, and CANCELS the rest of the job.
          ./wizcli scan dir . --policy "Phoebe IaC policy"

      # ---------------------------------------------------------
      # STEP 3: CD / Deployment 
      # ---------------------------------------------------------
      # This step will ONLY execute if Step 2 passes with no violations.
      - name: Terraform Apply
        run: terraform apply tfplan